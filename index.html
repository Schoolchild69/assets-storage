<!DOCTYPE html>

        .status { color: #ff4444; animation: blink 1s infinite; font-weight: bold; text-transform: uppercase; }
        .online { color: #00ff41 !important; animation: none !important; text-shadow: 0 0 15px #00ff41; }

        #player { margin-top: 30px; padding: 25px; border: 2px dashed #00ff41; min-height: 100px; background: rgba(0, 255, 65, 0.05); }
        h1 { letter-spacing: 7px; text-shadow: 3px 3px #ff0000; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #00ff41; margin: 25px 0; opacity: 0.5; }
