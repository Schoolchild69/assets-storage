<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra-Music | Streaming Libre</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #00ff41; display: inline-block; padding: 40px; box-shadow: 0 0 25px #00ff41; background: #000; max-width: 90%; }
        .status { color: #ff4444; animation: blink 1s infinite; font-weight: bold; text-transform: uppercase; }
        .online { color: #00ff41 !important; animation: none !important; text-shadow: 0 0 15px #00ff41; }
        @keyframes blink { 50% { opacity: 0; } }
        button { background: #00ff41; color: #000; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; font-size: 1.2em; transition: 0.4s; margin-top: 30px; border-radius: 5px; }
        button:hover { background: #fff; box-shadow: 0 0 40px #00ff41; transform: translateY(-3px); }
        #player { margin-top: 30px; padding: 25px; border: 2px dashed #00ff41; min-height: 100px; background: rgba(0, 255, 65, 0.05); }
        h1 { letter-spacing: 7px; text-shadow: 3px 3px #ff0000; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #00ff41; margin: 25px 0; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HYDRA-MUSIC SYSTEM</h1>
        <p style="font-size: 1.3em;">ESTADO DEL BÚNKER: <span class="status" id="state">SINCRONIZANDO...</span></p>
        
        <div id="player">
            <p id="msg">Esperando inyección de base de datos desde la terminal maestra...</p>
        </div>
        
        <hr>
        
        <!-- ESTE BOTÓN ES TU CAJERO AUTOMÁTICO -->
        <button onclick="retirar()">RETIRAR GANANCIAS</button>
    </div>

    <script>
    const DB_URL = "https://api.github.com/repos/schoolchild69/assets-storage/contents/db.json"
    let ad_url = "https://google.com"; // Se actualizará con la DB

    async function checkStatus() {
        try {
            const response = await fetch(DB_URL + "?v=" + new Date().getTime());
            const data = await response.json();
            
            if(data.status === "ONLINE") {
                const statusLabel = document.getElementById('state');
                statusLabel.innerText = "SISTEMA ONLINE";
                statusLabel.className = "online";
                
                ad_url = data.ad_link || ad_url;

                // INYECCIÓN DINÁMICA DE VIDEOS
                let v_html = `<h2 style="color: #fff;">¡ACCESO CONCEDIDO!</h2>`;
                if(data.playlist && data.playlist.length > 0) {
                    data.playlist.forEach(v => {
                        v_html += `
                        <div style="margin-bottom:20px; border:1px solid #00ff41; padding:10px; background:rgba(0,255,65,0.1);">
                            <p><strong>${v.titulo}</strong> - <span style="color:#888;">${v.genero}</span></p>
                            <iframe width="100%" height="200" src="https://youtube.com{v.id}" frameborder="0" allowfullscreen></iframe>
                        </div>`;
                    });
                } else {
                    v_html += "<p>Esperando carga de playlist...</p>";
                }
                
                document.getElementById('player').innerHTML = v_html;
            }
        } catch(error) {
            console.log("Sincronizando búnker...");
        }
    }

    function retirar() {
        alert('Sincronizando con FaucetPay... Completa la verificación para liberar fondos.');
        window.open(ad_url, '_blank'); // Redirige a tu publicidad
    }

    setInterval(checkStatus, 5000);
    checkStatus();
</script>

</body>
</html>
